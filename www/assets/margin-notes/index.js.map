<form class="margin-notes-solid-connection" data-margin-notes-solid-connection>
  <label class="margin-notes-solid-connection-webid">
    <span>WebID</span>
    <input
      type="url"
      inputmode="url"
      autocomplete="url"
      placeholder="https://example.solidcommunity.net/profile/card#me"
      data-margin-notes-solid-webid
    >
  </label>
  <button type="submit" class="ds-button ds-button-primary">Connect</button>
  <p class="margin-notes-solid-connection-status" data-margin-notes-solid-status>Not connected</p>
</form>

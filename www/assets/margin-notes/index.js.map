<div class="margin-notes-editor-modal-dialog ds-dialog">
  <div class="margin-notes-editor-modal-header">
    <h2 data-title></h2>
    <button type="button" data-action="cancel" class="margin-notes-editor-close ds-button ds-button-naked" aria-label="Close">x</button>
  </div>
  <div class="margin-notes-editor-modal-content">
    <div class="margin-notes-cobalt-editor" data-editor-container></div>
  </div>
  <div class="margin-notes-editor-modal-footer">
    <button type="button" data-action="cancel" class="margin-notes-editor-btn-cancel ds-button ds-button-default">Cancel</button>
    <button type="button" data-action="save" class="margin-notes-editor-btn-save ds-button ds-button-primary">Save</button>
  </div>
</div>

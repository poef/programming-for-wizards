<article class="margin-notes-target-note">
  <button
    type="button"
    class="margin-notes-target-note-toggle"
    aria-expanded="false"
    data-simply-shortcuts="marginNotesNote"
    data-simply-command="expandInlineNote"
    data-simply-value=":value"
  ><span class="margin-notes-target-note-text" data-simply-field="bodyText"></span></button>
  <button
    type="button"
    class="margin-notes-target-note-close"
    aria-label="Close note"
    data-simply-command="collapseInlineNote"
    data-simply-value=":value"
  >x</button>
  <span class="margin-notes-target-note-actions">
    <button
      type="button"
      class="margin-notes-target-note-action"
      data-simply-command="updateNote"
      data-simply-value=":value"
    >Edit</button>
    <button
      type="button"
      class="margin-notes-target-note-action"
      data-simply-command="deleteNote"
      data-simply-value=":value"
    >Delete</button>
  </span>
</article>
